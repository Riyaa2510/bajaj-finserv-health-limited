<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>BFHL — Node Hierarchy Explorer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&family=Syne:wght@400;600;800&display=swap" rel="stylesheet" />
  <style>
    :root {
      --bg: #0a0a0f;
      --surface: #12121a;
      --card: #1a1a26;
      --border: #2a2a40;
      --accent: #7c6fff;
      --accent2: #ff6f9c;
      --green: #4fffb0;
      --yellow: #ffda6f;
      --red: #ff6f6f;
      --text: #e8e8f5;
      --muted: #6b6b88;
      --font-display: 'Syne', sans-serif;
      --font-mono: 'Space Mono', monospace;
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-mono);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* BG grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(124,111,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(124,111,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
      z-index: 0;
    }

    .glow-orb {
      position: fixed;
      width: 500px; height: 500px;
      border-radius: 50%;
      filter: blur(120px);
      opacity: 0.12;
      pointer-events: none;
      z-index: 0;
    }
    .glow-orb.a { background: var(--accent); top: -100px; left: -100px; }
    .glow-orb.b { background: var(--accent2); bottom: -100px; right: -100px; }

    .container {
      position: relative;
      z-index: 1;
      max-width: 900px;
      margin: 0 auto;
      padding: 2rem 1.5rem 4rem;
    }

    /* ── Header ── */
    header {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin-bottom: 3rem;
      animation: fadeDown 0.6s ease both;
    }
    .logo-badge {
      width: 48px; height: 48px;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      border-radius: 12px;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 1.1rem;
      color: #fff;
      flex-shrink: 0;
      box-shadow: 0 0 24px rgba(124,111,255,0.4);
    }
    header h1 {
      font-family: var(--font-display);
      font-size: clamp(1.4rem, 4vw, 2rem);
      font-weight: 800;
      letter-spacing: -0.02em;
    }
    header h1 span { color: var(--accent); }
    header p {
      font-size: 0.75rem;
      color: var(--muted);
      margin-top: 2px;
    }

    /* ── Input section ── */
    .input-section {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 1.5rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.6s 0.1s ease both;
    }

    .input-label {
      font-size: 0.7rem;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin-bottom: 0.75rem;
      display: flex;
      align-items: center;
      gap: 0.5rem;
    }
    .input-label::after {
      content: '';
      flex: 1;
      height: 1px;
      background: var(--border);
    }

    textarea {
      width: 100%;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.85rem;
      padding: 1rem;
      resize: vertical;
      min-height: 120px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
      line-height: 1.6;
    }
    textarea:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(124,111,255,0.15);
    }
    textarea::placeholder { color: var(--muted); }

    .input-hint {
      font-size: 0.7rem;
      color: var(--muted);
      margin-top: 0.6rem;
    }
    .input-hint code {
      color: var(--green);
      background: rgba(79,255,176,0.08);
      padding: 1px 5px;
      border-radius: 4px;
    }

    /* API URL input */
    .url-row {
      display: flex;
      gap: 0.75rem;
      margin-top: 1rem;
      align-items: center;
    }
    .url-row input {
      flex: 1;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: var(--font-mono);
      font-size: 0.8rem;
      padding: 0.6rem 0.8rem;
      outline: none;
      transition: border-color 0.2s;
    }
    .url-row input:focus { border-color: var(--accent); }

    /* ── Submit Button ── */
    .btn-submit {
      width: 100%;
      margin-top: 1.25rem;
      padding: 0.9rem;
      background: linear-gradient(135deg, var(--accent), #a78bfa);
      border: none;
      border-radius: 10px;
      color: #fff;
      font-family: var(--font-display);
      font-size: 1rem;
      font-weight: 700;
      letter-spacing: 0.05em;
      cursor: pointer;
      transition: transform 0.15s, box-shadow 0.2s, opacity 0.2s;
      box-shadow: 0 4px 20px rgba(124,111,255,0.35);
    }
    .btn-submit:hover { transform: translateY(-1px); box-shadow: 0 6px 28px rgba(124,111,255,0.5); }
    .btn-submit:active { transform: translateY(0); }
    .btn-submit:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

    /* ── Loader ── */
    .loader {
      display: none;
      text-align: center;
      padding: 2rem;
      color: var(--muted);
      font-size: 0.8rem;
      animation: pulse 1.2s infinite;
    }
    .loader.show { display: block; }

    /* ── Error ── */
    .error-box {
      display: none;
      background: rgba(255,111,111,0.1);
      border: 1px solid rgba(255,111,111,0.3);
      border-radius: 10px;
      padding: 1rem 1.25rem;
      color: var(--red);
      font-size: 0.85rem;
      margin-bottom: 1.5rem;
      animation: fadeUp 0.3s ease both;
    }
    .error-box.show { display: block; }

    /* ── Results ── */
    #results { animation: fadeUp 0.5s ease both; }

    .section-title {
      font-family: var(--font-display);
      font-size: 0.7rem;
      font-weight: 600;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.15em;
      margin: 2rem 0 0.75rem;
    }

    /* Identity card */
    .identity-grid {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
      gap: 0.75rem;
    }
    .id-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 0.9rem 1rem;
    }
    .id-card .label { font-size: 0.65rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.1em; }
    .id-card .value { font-size: 0.9rem; color: var(--accent); margin-top: 0.25rem; word-break: break-all; }

    /* Summary bar */
    .summary-bar {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 0.75rem;
    }
    .stat-pill {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      text-align: center;
    }
    .stat-pill .num {
      font-family: var(--font-display);
      font-size: 2rem;
      font-weight: 800;
      line-height: 1;
    }
    .stat-pill .num.green { color: var(--green); }
    .stat-pill .num.yellow { color: var(--yellow); }
    .stat-pill .num.purple { color: var(--accent); }
    .stat-pill .desc { font-size: 0.65rem; color: var(--muted); margin-top: 0.3rem; text-transform: uppercase; letter-spacing: 0.1em; }

    /* Hierarchy cards */
    .hierarchy-grid {
      display: grid;
      gap: 1rem;
    }
    .h-card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 12px;
      overflow: hidden;
      transition: border-color 0.2s;
    }
    .h-card:hover { border-color: var(--accent); }
    .h-card-header {
      display: flex;
      align-items: center;
      gap: 0.75rem;
      padding: 0.9rem 1.1rem;
      background: rgba(255,255,255,0.02);
      border-bottom: 1px solid var(--border);
    }
    .root-badge {
      width: 32px; height: 32px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      font-family: var(--font-display);
      font-weight: 800;
      font-size: 0.9rem;
      background: linear-gradient(135deg, var(--accent), var(--accent2));
      color: #fff;
      flex-shrink: 0;
    }
    .root-badge.cycle { background: linear-gradient(135deg, var(--red), #ff9f6f); }
    .h-card-title { font-family: var(--font-display); font-weight: 700; }
    .h-card-title small { display: block; font-size: 0.65rem; color: var(--muted); font-family: var(--font-mono); font-weight: 400; }
    .depth-tag {
      margin-left: auto;
      background: rgba(124,111,255,0.15);
      color: var(--accent);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 100px;
    }
    .cycle-tag {
      margin-left: auto;
      background: rgba(255,111,111,0.15);
      color: var(--red);
      font-size: 0.7rem;
      padding: 3px 8px;
      border-radius: 100px;
    }
    .h-card-body { padding: 1rem 1.1rem; }
    /* Tree visual */
    .tree-visual { font-size: 0.82rem; line-height: 1.8; }
    .tree-node { display: flex; align-items: flex-start; }
    .tree-node .connector { color: var(--muted); margin-right: 4px; white-space: pre; font-family: var(--font-mono); }
    .tree-node .node-name {
      color: var(--green);
      background: rgba(79,255,176,0.08);
      padding: 1px 6px;
      border-radius: 4px;
      font-family: var(--font-mono);
    }
    .tree-children { margin-left: 16px; }

    /* Tags row */
    .tags-row {
      display: flex;
      flex-wrap: wrap;
      gap: 0.5rem;
    }
    .entry-tag {
      font-size: 0.75rem;
      padding: 3px 9px;
      border-radius: 6px;
      font-family: var(--font-mono);
    }
    .entry-tag.invalid { background: rgba(255,111,111,0.12); color: var(--red); border: 1px solid rgba(255,111,111,0.2); }
    .entry-tag.duplicate { background: rgba(255,218,111,0.12); color: var(--yellow); border: 1px solid rgba(255,218,111,0.2); }
    .empty-tag { color: var(--muted); font-size: 0.8rem; }

    /* Raw JSON toggle */
    .raw-toggle {
      background: none;
      border: 1px solid var(--border);
      color: var(--muted);
      font-family: var(--font-mono);
      font-size: 0.75rem;
      padding: 0.4rem 0.8rem;
      border-radius: 6px;
      cursor: pointer;
      margin-top: 2rem;
      transition: color 0.2s, border-color 0.2s;
    }
    .raw-toggle:hover { color: var(--text); border-color: var(--accent); }
    pre.raw-json {
      display: none;
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
      font-size: 0.75rem;
      overflow-x: auto;
      margin-top: 0.75rem;
      color: var(--green);
      line-height: 1.6;
    }
    pre.raw-json.show { display: block; }

    /* Animations */
    @keyframes fadeDown { from { opacity:0; transform: translateY(-16px); } to { opacity:1; transform: none; } }
    @keyframes fadeUp   { from { opacity:0; transform: translateY(16px);  } to { opacity:1; transform: none; } }
    @keyframes pulse    { 0%,100% { opacity:1; } 50% { opacity:0.4; } }
  </style>
</head>
<body>
  <div class="glow-orb a"></div>
  <div class="glow-orb b"></div>

  <div class="container">
    <header>
      <div class="logo-badge">BF</div>
      <div>
        <h1>Node <span>Hierarchy</span> Explorer</h1>
        <p>SRM Full Stack Challenge · POST /bfhl</p>
      </div>
    </header>

    <div class="input-section">
      <div class="input-label">Input Nodes</div>
      <textarea id="nodeInput" placeholder='A->B, A->C, B->D, X->Y, Y->Z, Z->X, hello, 1->2'></textarea>
      <div class="input-hint">Enter edges separated by commas or new lines. Valid format: <code>A->B</code> (single uppercase letters only)</div>

      <div class="url-row">
        <input type="text" id="apiUrl" value="http://localhost:3000" placeholder="API base URL (e.g. https://yourname-bfhl.onrender.com)" />
      </div>

      <button class="btn-submit" id="submitBtn" onclick="callAPI()">
        ▶ &nbsp; Analyse Hierarchy
      </button>
    </div>

    <div class="loader" id="loader">⟳ &nbsp; Calling API…</div>
    <div class="error-box" id="errorBox"></div>
    <div id="results"></div>
  </div>

  <script>
    async function callAPI() {
      const raw = document.getElementById('nodeInput').value.trim();
      const apiBase = document.getElementById('apiUrl').value.trim().replace(/\/$/, '');
      const btn = document.getElementById('submitBtn');
      const loader = document.getElementById('loader');
      const errorBox = document.getElementById('errorBox');
      const results = document.getElementById('results');

      if (!raw) { showError('Please enter at least one node string.'); return; }

      // Parse input — comma or newline separated
      const data = raw.split(/[\n,]+/).map(s => s.trim()).filter(Boolean);

      errorBox.classList.remove('show');
      results.innerHTML = '';
      loader.classList.add('show');
      btn.disabled = true;

      try {
        const resp = await fetch(`${apiBase}/bfhl`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ data })
        });

        if (!resp.ok) throw new Error(`HTTP ${resp.status}: ${resp.statusText}`);
        const json = await resp.json();
        renderResults(json);
      } catch (e) {
        showError(`API call failed: ${e.message}. Make sure the backend is running and CORS is enabled.`);
      } finally {
        loader.classList.remove('show');
        btn.disabled = false;
      }
    }

    function showError(msg) {
      const errorBox = document.getElementById('errorBox');
      errorBox.textContent = '⚠ ' + msg;
      errorBox.classList.add('show');
    }

    function renderResults(data) {
      const r = document.getElementById('results');

      // Identity
      let html = `<div class="section-title">Identity</div>
      <div class="identity-grid">
        <div class="id-card"><div class="label">User ID</div><div class="value">${esc(data.user_id)}</div></div>
        <div class="id-card"><div class="label">Email</div><div class="value">${esc(data.email_id)}</div></div>
        <div class="id-card"><div class="label">Roll Number</div><div class="value">${esc(data.college_roll_number)}</div></div>
      </div>`;

      // Summary
      const s = data.summary;
      html += `<div class="section-title">Summary</div>
      <div class="summary-bar">
        <div class="stat-pill"><div class="num green">${s.total_trees}</div><div class="desc">Valid Trees</div></div>
        <div class="stat-pill"><div class="num yellow">${s.total_cycles}</div><div class="desc">Cyclic Groups</div></div>
        <div class="stat-pill"><div class="num purple">${esc(s.largest_tree_root || '—')}</div><div class="desc">Deepest Root</div></div>
      </div>`;

      // Hierarchies
      html += `<div class="section-title">Hierarchies (${data.hierarchies.length})</div><div class="hierarchy-grid">`;
      for (const h of data.hierarchies) {
        const isCycle = h.has_cycle === true;
        html += `<div class="h-card">
          <div class="h-card-header">
            <div class="root-badge ${isCycle ? 'cycle' : ''}">${esc(h.root)}</div>
            <div class="h-card-title">${esc(h.root)} Tree
              <small>${isCycle ? 'Cyclic group' : `Depth: ${h.depth} node${h.depth !== 1 ? 's' : ''}`}</small>
            </div>
            ${isCycle
              ? `<span class="cycle-tag">⟳ CYCLE</span>`
              : `<span class="depth-tag">depth ${h.depth}</span>`}
          </div>
          <div class="h-card-body">
            ${isCycle
              ? `<div style="color:var(--muted);font-size:0.8rem">Cycle detected — no tree structure available.</div>`
              : `<div class="tree-visual">${renderTree(h.tree)}</div>`
            }
          </div>
        </div>`;
      }
      html += `</div>`;

      // Invalid entries
      html += `<div class="section-title">Invalid Entries</div><div class="tags-row">`;
      if (data.invalid_entries.length === 0) {
        html += `<span class="empty-tag">None ✓</span>`;
      } else {
        for (const e of data.invalid_entries) html += `<span class="entry-tag invalid">${esc(e)}</span>`;
      }
      html += `</div>`;

      // Duplicate edges
      html += `<div class="section-title">Duplicate Edges</div><div class="tags-row">`;
      if (data.duplicate_edges.length === 0) {
        html += `<span class="empty-tag">None ✓</span>`;
      } else {
        for (const e of data.duplicate_edges) html += `<span class="entry-tag duplicate">${esc(e)}</span>`;
      }
      html += `</div>`;

      // Raw JSON
      html += `<button class="raw-toggle" onclick="toggleRaw(this)">Show Raw JSON</button>
      <pre class="raw-json">${esc(JSON.stringify(data, null, 2))}</pre>`;

      r.innerHTML = html;
    }

    function renderTree(treeObj, prefix = '') {
      let html = '';
      const entries = Object.entries(treeObj);
      entries.forEach(([node, children], i) => {
        const isLast = i === entries.length - 1;
        const connector = prefix + (isLast ? '└── ' : '├── ');
        const childPrefix = prefix + (isLast ? '    ' : '│   ');
        html += `<div class="tree-node">
          <span class="connector">${esc(connector)}</span>
          <span class="node-name">${esc(node)}</span>
        </div>`;
        if (Object.keys(children).length > 0) {
          html += `<div class="tree-children">${renderTree(children, childPrefix)}</div>`;
        }
      });
      return html || '<span style="color:var(--muted);font-size:0.8rem">Empty tree</span>';
    }

    function toggleRaw(btn) {
      const pre = btn.nextElementSibling;
      pre.classList.toggle('show');
      btn.textContent = pre.classList.contains('show') ? 'Hide Raw JSON' : 'Show Raw JSON';
    }

    function esc(s) {
      return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    // Allow Enter in URL field to trigger submit
    document.getElementById('apiUrl')?.addEventListener('keydown', e => {
      if (e.key === 'Enter') callAPI();
    });
  </script>
</body>
</html>
